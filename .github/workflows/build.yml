name: CI

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Run shellcheck on all scripts
      run: |
        find scripts -name "*.sh" -exec shellcheck \
          -x \
          -P scripts \
          -P scripts/strategies \
          -P scripts/tools \
          {} +

  bats:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install bats
      run: sudo apt-get update && sudo apt-get install -y bats

    - name: Run BATS tests
      run: bats scripts/tests/*.bats

  build:
    needs: [shellcheck, bats]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Install build dependencies
      run: |
        pacman -Sy --noconfirm archlinux-keyring
        pacman -Syu --noconfirm git base-devel rust

    - uses: actions/checkout@v5

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test 
    - name: Build release binary
      run: cargo build --release 
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit

    - name: Upload binary artifact
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v5
      with:
        name: archtui
        path: target/release/archtui

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download binary artifact
      uses: actions/download-artifact@v5
      with:
        name: archtui

    - name: Generate SHA256 checksum
      run: sha256sum archtui > archtui.sha256

    - name: Download theme assets from previous release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p themes
        prev_tag=$(gh release list --repo "${{ github.repository }}" \
          --exclude-drafts --exclude-pre-releases --limit 2 \
          --json tagName -q '.[1].tagName // empty')
        if [[ -z "$prev_tag" ]]; then
          echo "::warning::No previous release found — theme assets will not be carried forward"
        else
          echo "Downloading theme assets from release $prev_tag"
          for theme in arch-glow arch-mac-style HyperFluent-arch; do
            gh release download "$prev_tag" --repo "${{ github.repository }}" \
              --pattern "${theme}.tar.gz" --dir themes || \
              echo "::warning::Theme asset ${theme}.tar.gz not found in release $prev_tag"
          done
        fi

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          archtui
          archtui.sha256
          themes/*.tar.gz
