name: CI

on:
  push:
    branches: [main, dev, archtui-dev]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Run shellcheck on all scripts
      run: |
        find scripts -name "*.sh" -exec shellcheck \
          -x \
          -P scripts \
          -P scripts/strategies \
          -P scripts/tools \
          {} +

  bats:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install bats
      run: sudo apt-get update && sudo apt-get install -y bats

    - name: Run BATS tests
      run: bats scripts/tests/*.bats

  build:
    needs: [shellcheck, bats]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Install build dependencies
      run: |
        pacman -Sy --noconfirm archlinux-keyring
        pacman -Syu --noconfirm git base-devel rust

    - uses: actions/checkout@v5

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test 
    - name: Build release binary
      run: cargo build --release 
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit

    - name: Upload binary artifact
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/archtui-dev'
      uses: actions/upload-artifact@v5
      with:
        name: archtui
        path: target/release/archtui

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download binary artifact
      uses: actions/download-artifact@v5
      with:
        name: archtui

    - name: Generate SHA256 checksum
      run: sha256sum archtui > archtui.sha256

    - name: Download theme assets from previous release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p themes
        prev_tag=$(gh release list --repo "${{ github.repository }}" \
          --exclude-drafts --exclude-pre-releases --limit 2 \
          --json tagName -q '.[1].tagName // empty')
        if [[ -z "$prev_tag" ]]; then
          echo "::warning::No previous release found — theme assets will not be carried forward"
        else
          echo "Downloading theme assets from release $prev_tag"
          for theme in arch-glow arch-mac-style HyperFluent-arch; do
            gh release download "$prev_tag" --repo "${{ github.repository }}" \
              --pattern "${theme}.tar.gz" --dir themes || \
              echo "::warning::Theme asset ${theme}.tar.gz not found in release $prev_tag"
          done
        fi

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          archtui
          archtui.sha256
          themes/*.tar.gz

  dev-release:
    if: github.ref == 'refs/heads/archtui-dev'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download binary artifact
      uses: actions/download-artifact@v5
      with:
        name: archtui

    - name: Generate SHA256 checksum
      run: sha256sum archtui > archtui.sha256

    - name: Create or update dev pre-release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Delete existing dev release if present (rolling pre-release)
        gh release delete dev --repo "${{ github.repository }}" --yes 2>/dev/null || true
        gh api repos/${{ github.repository }}/git/refs/tags/dev -X DELETE 2>/dev/null || true
        gh release create dev \
          --repo "${{ github.repository }}" \
          --title "archtui-dev (latest)" \
          --notes "Pre-release build from \`archtui-dev\` branch. For testing only — do not use on production systems." \
          --prerelease \
          --target archtui-dev \
          archtui archtui.sha256
